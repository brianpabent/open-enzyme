name: Wiki Sweep

# Runs the two-pass Open Enzyme doc sweep on push. Replaces the local fswatch
# launchd daemon (scripts/wiki-watch.sh) — see scripts/sweep-prompt.md for the
# full sweep protocol. One sweep per push, consuming all wiki/*.md changes at
# once, so cross-file synthesis is coherent.
#
# Secrets required:
#   ANTHROPIC_API_KEY — Anthropic API key used by the claude CLI
#
# Permissions: contents: write (so the sweep commit can be pushed back to main)

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**.md'
      - '!wiki/synthesis.md'
  workflow_dispatch:
    inputs:
      trigger_paths:
        description: 'Wiki file path(s) to sweep (space-separated). Blank = diff against HEAD~1.'
        required: false
        type: string

# Never run two sweeps at once — they'd fight over git state.
concurrency:
  group: wiki-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history — needed so `git log --grep='^sweep'` can locate the
          # last sweep commit and diff since then (catching files missed by any
          # prior push where the workflow didn't run).
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute trigger files
        id: trigger
        run: |
          set -euo pipefail

          # Diff strategy: find the most recent sweep commit and diff since it.
          # This catches any wiki changes that landed between sweeps — e.g., if
          # a previous push's workflow run failed, was skipped, or the action
          # was disabled, those files still get picked up by the next run. No
          # separate state file; the sweep commit itself is the high-water mark.
          #
          # Commit message prefix convention (see scripts/sweep-prompt.md Pass 4):
          #   "sweep: <basenames> → <N> files updated [skip ci]"
          #   "sweep #N: ..."  (historical format)
          #   "sweeps: ..."    (historical format)
          # Any of these match ^sweep.

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.trigger_paths }}" ]]; then
            # Manual override with explicit paths — skip diff logic.
            echo "Manual dispatch with explicit trigger paths"
            CHANGED=$(echo "${{ inputs.trigger_paths }}" | tr ' ' '\n' | grep -v '^$' || true)
            DIFF_BASE="manual"
          else
            LAST_SWEEP=$(git log --format='%H' --grep='^sweep' -n 1 || true)
            if [[ -n "$LAST_SWEEP" ]]; then
              DIFF_BASE="$LAST_SWEEP"
              echo "Last sweep commit: $LAST_SWEEP"
              echo "  $(git log -1 --format='%s' "$LAST_SWEEP")"
            else
              # No prior sweep in history — fall back to this push's range.
              DIFF_BASE="HEAD~1"
              echo "No prior sweep commit found; diffing HEAD~1..HEAD"
            fi

            CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD 2>/dev/null \
              | grep -E '^wiki/.*\.md$' \
              | grep -v '^wiki/synthesis\.md$' \
              || true)
          fi

          if [[ -z "${CHANGED// /}" ]]; then
            echo "No wiki changes to sweep (diff base: $DIFF_BASE)"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
          {
            echo "changed<<TRIGGER_EOF"
            echo "$CHANGED"
            echo "TRIGGER_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Trigger files for this sweep (since $DIFF_BASE):"
          echo "$CHANGED" | sed 's/^/  /'

      - name: Run sweep
        if: steps.trigger.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGER_FILES: ${{ steps.trigger.outputs.changed }}
          DIFF_BASE: ${{ steps.trigger.outputs.diff_base }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TRIGGER_LIST=$(echo "$TRIGGER_FILES" | awk 'NF {printf "  - %s\n", $0}')

          # Build the combined prompt in a temp file. Avoids the failure mode
          # where a multiline string embedded in a YAML literal block with
          # column-0 separator lines (like '---') terminates the block early.
          PROMPT_FILE="$(mktemp)"
          {
            cat scripts/sweep-prompt.md
            echo ""
            echo "---"
            echo ""
            echo "TRIGGER: Files changed since last sweep (${DIFF_BASE}) at ${TIMESTAMP}:"
            echo "${TRIGGER_LIST}"
            echo "commit=yes"
            echo "ci=github-actions"
          } > "$PROMPT_FILE"

          # --dangerously-skip-permissions lets the CLI use Edit/Write/Bash
          # without interactive approval. Required for CI.
          claude --dangerously-skip-permissions -p "$(cat "$PROMPT_FILE")"

      - name: Push sweep output
        if: steps.trigger.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          # Pass 4 of the sweep-prompt already ran `git commit` locally in the
          # runner. Push any new commits back to main.
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
          else
            echo "Sweep produced no new commits to push"
          fi
