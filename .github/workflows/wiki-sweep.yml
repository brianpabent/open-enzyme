name: Wiki Sweep (Hybrid)

# Three-stage hybrid sweep architecture:
#
#   Pass 1 — Claude propagation (small input, precision)
#       Reads trigger files, propagates findings across affected wiki pages,
#       commits surgical edits. Sweep-prompt-1-propagate.md.
#
#   Pass 2 — Gemini 2.5 Pro synthesis (large input, full corpus)
#       Reads ALL of wiki/, finds cross-document connections, outputs raw
#       synthesis to logs/v4-synthesis-<date>-<sha>.md. The 2M context window
#       lets Gemini 2.5 Pro see the whole knowledge base in one call.
#       (Switched from DeepSeek V4-Pro on 2026-04-25 — reliability;
#       Gemini surfaced the same top findings on the same corpus.)
#       Sweep-prompt-2-synthesize.md.
#
#   Pass 3 — Claude review (small input, critique)
#       Reads the Pass 2 synthesis log, writes interleaved review (synthesizer
#       content + Claude verdict blockquote per item) prepended to wiki/synthesis.md.
#       Verdict vocabulary: Confirmed / Confirmed-prioritize / Partial /
#       Push-back / Rejected / Augment / Defer. Sweep-prompt-3-review.md.
#
# Each job has [skip-wiki-sweep] in its commit message + the workflow's job-
# level `if:` checks for that marker, so internal commits don't recursively
# retrigger the whole pipeline.
#
# Secrets required:
#   OPENROUTER_API_KEY — used by all three passes:
#                          Pass 1 (Sonnet), Pass 2 (Gemini 2.5 Pro), Pass 3 (Sonnet)
#
# Why every pass routes through OpenRouter rather than Anthropic-direct:
# all three passes send enough cumulative input to blow past the 30K
# input-tokens-per-minute cap on the Anthropic-direct API tier. OpenRouter
# is its own rate-limit pool.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**.md'
      - '!wiki/synthesis.md'
  workflow_dispatch:
    inputs:
      trigger_paths:
        description: 'Wiki file path(s) to sweep (space-separated). Blank = diff against last sweep commit.'
        required: false
        type: string

# Never run two sweeps at once — they'd fight over git state.
concurrency:
  group: wiki-sweep
  cancel-in-progress: false

jobs:
  # ============================================================================
  # PASS 1 — Claude propagation
  # ============================================================================
  propagate:
    name: "Pass 1 — Claude propagation"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip-wiki-sweep]')"
    outputs:
      trigger_files: ${{ steps.trigger.outputs.changed }}
      diff_base:     ${{ steps.trigger.outputs.diff_base }}
      sha:           ${{ steps.trigger.outputs.sha }}
      had_changes:   ${{ steps.trigger.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute trigger files
        id: trigger
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.trigger_paths }}" ]]; then
            echo "Manual dispatch with explicit trigger paths"
            CHANGED=$(echo "${{ inputs.trigger_paths }}" | tr ' ' '\n' | grep -v '^$' || true)
            DIFF_BASE="manual"
          else
            LAST_SWEEP=$(git log --format='%H' --grep='^sweep' -n 1 || true)
            if [[ -n "$LAST_SWEEP" ]]; then
              DIFF_BASE="$LAST_SWEEP"
              echo "Last sweep commit: $LAST_SWEEP"
            else
              DIFF_BASE="HEAD~1"
              echo "No prior sweep commit found; diffing HEAD~1..HEAD"
            fi
            CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD 2>/dev/null \
              | grep -E '^wiki/.*\.md$' \
              | grep -v '^wiki/synthesis\.md$' || true)
          fi

          if [[ -z "${CHANGED// /}" ]]; then
            echo "No wiki changes to sweep"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true"            >> "$GITHUB_OUTPUT"
          echo "diff_base=$DIFF_BASE"        >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.sha }}"       >> "$GITHUB_OUTPUT"
          {
            echo "changed<<TRIGGER_EOF"
            echo "$CHANGED"
            echo "TRIGGER_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Trigger files:"
          echo "$CHANGED" | sed 's/^/  /'

          # Skip-Pass-1 check: if every trigger file was already propagated
          # in the most recent sweep-1-propagate commit (i.e. no edits to
          # any of them since), skip the redundant Sonnet run. Pass 2 still
          # runs against the current state.
          LAST_PASS_1=$(git log --format='%H' --grep='^sweep-1-propagate' -n 1 || true)
          SKIP_PASS_1="false"
          if [[ -n "$LAST_PASS_1" ]]; then
            STALE=""
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              if git log --format='%H' "$LAST_PASS_1"..HEAD -- "$f" | grep -q .; then
                STALE="$STALE $f"
              fi
            done <<< "$CHANGED"
            if [[ -z "${STALE// /}" ]]; then
              SKIP_PASS_1="true"
              echo "All trigger files already propagated in $LAST_PASS_1 — skipping Pass 1"
            fi
          fi
          echo "skip_pass_1=$SKIP_PASS_1" >> "$GITHUB_OUTPUT"

      - name: Run Pass 1 propagation (Sonnet via OpenRouter)
        if: steps.trigger.outputs.has_changes == 'true' && steps.trigger.outputs.skip_pass_1 != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRIGGER_FILES:      ${{ steps.trigger.outputs.changed }}
          DIFF_BASE:          ${{ steps.trigger.outputs.diff_base }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 scripts/sweep-1-propagate.py \
            --commit-sha "${{ github.sha }}" \
            --trigger-files "$TRIGGER_FILES" \
            --diff-base "$DIFF_BASE" \
            --model anthropic/claude-sonnet-4-6 \
            --max-iterations 40

      - name: Push propagation
        if: steps.trigger.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
          else
            echo "Pass 1 produced no commit"
          fi

  # ============================================================================
  # PASS 2 — Gemini 2.5 Pro synthesis (full corpus)
  # ============================================================================
  synthesize:
    name: "Pass 2 — Gemini 2.5 Pro synthesis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: propagate
    permissions:
      contents: write
    if: needs.propagate.outputs.had_changes == 'true'
    outputs:
      synthesis_log: ${{ steps.run.outputs.synthesis_log }}
      had_synthesis: ${{ steps.run.outputs.had_synthesis }}

    steps:
      - name: Checkout (post-Pass-1 state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Gemini 2.5 Pro synthesis
        id: run
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Compose the trigger files string for the synthesis script
          TRIGGER_LIST=$(echo "${{ needs.propagate.outputs.trigger_files }}" | tr '\n' ',' | sed 's/,$//')

          SYNTHESIS_LOG=$(python3 scripts/synthesize.py \
            --commit-sha "${{ github.sha }}" \
            --trigger-files "$TRIGGER_LIST" \
            --diff-base "${{ needs.propagate.outputs.diff_base }}")

          if [[ -z "$SYNTHESIS_LOG" || ! -f "$SYNTHESIS_LOG" ]]; then
            echo "Pass 2 synthesis produced no output file"
            echo "had_synthesis=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "synthesis_log=$SYNTHESIS_LOG" >> "$GITHUB_OUTPUT"
          echo "had_synthesis=true"           >> "$GITHUB_OUTPUT"

          git add "$SYNTHESIS_LOG"
          git commit -m "sweep-2-synthesize: Gemini 2.5 Pro raw synthesis → $SYNTHESIS_LOG [skip-wiki-sweep]"
          git push

  # ============================================================================
  # PASS 3 — Claude review (interleaved into wiki/synthesis.md)
  # ============================================================================
  review:
    name: "Pass 3 — Claude review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [propagate, synthesize]
    permissions:
      contents: write
    if: needs.synthesize.outputs.had_synthesis == 'true'

    steps:
      - name: Checkout (post-Pass-2 state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Count markers in Pass 2 synthesis
        id: count
        env:
          SYNTHESIS_LOG: ${{ needs.synthesize.outputs.synthesis_log }}
        run: |
          set -euo pipefail
          MARKER_COUNT=$(grep -c '{{PEER-REVIEW}}' "$SYNTHESIS_LOG" || true)
          MARKER_COUNT=${MARKER_COUNT:-0}
          echo "Found $MARKER_COUNT {{PEER-REVIEW}} markers in Pass 2 synthesis"
          echo "marker_count=$MARKER_COUNT" >> "$GITHUB_OUTPUT"

      - name: Run Pass 3 review (Sonnet via OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REVIEWER_MODEL:    anthropic/claude-sonnet-4-6
          SYNTHESIS_LOG:     ${{ needs.synthesize.outputs.synthesis_log }}
          TRIGGER_FILES:     ${{ needs.propagate.outputs.trigger_files }}
          DIFF_BASE:         ${{ needs.propagate.outputs.diff_base }}
          MARKER_COUNT:      ${{ steps.count.outputs.marker_count }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Capture the reviewer's stdout to a reviews file. The Pass 3 prompt
          # instructs it to output ONLY review blockquotes separated by
          # <<<NEXT>>> — the merge script parses that and substitutes into
          # the Pass 2 synthesis.
          REVIEWS_FILE="$(mktemp --suffix=.txt)"
          python3 scripts/sweep-3-review.py \
            --synthesis-log "$SYNTHESIS_LOG" \
            --commit-sha "${{ github.sha }}" \
            --diff-base "$DIFF_BASE" \
            --trigger-files "$TRIGGER_FILES" \
            --marker-count "$MARKER_COUNT" \
            --model "$REVIEWER_MODEL" \
            > "$REVIEWS_FILE"

          # Run the deterministic merge — Pass 2 content preserved verbatim
          python3 scripts/synthesis-merge.py \
            --synthesis-log "$SYNTHESIS_LOG" \
            --reviews-file "$REVIEWS_FILE" \
            --commit-sha "${{ github.sha }}" \
            --diff-base "$DIFF_BASE" \
            --trigger-files "$(echo "$TRIGGER_FILES" | tr '\n' ',' | sed 's/,$//')" \
            --synthesizer "google/gemini-2.5-pro" \
            --reviewer "$REVIEWER_MODEL"

          # Commit the synthesis.md prepend
          if git diff --quiet wiki/synthesis.md; then
            echo "Pass 3 made no changes to synthesis.md"
            exit 0
          fi
          git add wiki/synthesis.md
          git commit -m "sweep-3-review: Claude review of Gemini 2.5 Pro synthesis → wiki/synthesis.md [skip-wiki-sweep]"

      - name: Push review
        run: |
          set -euo pipefail
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
          else
            echo "Pass 3 produced no commit"
          fi
