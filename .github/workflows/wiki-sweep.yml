name: Wiki Sweep (Hybrid)

# Three-stage hybrid sweep architecture:
#
#   Pass 1 — Claude propagation (small input, precision)
#       Reads trigger files, propagates findings across affected wiki pages,
#       commits surgical edits. Sweep-prompt-1-propagate.md.
#
#   Pass 2 — V4 synthesis (large input, full corpus)
#       Reads ALL of wiki/, finds cross-document connections, outputs raw
#       synthesis to logs/v4-synthesis-<date>-<sha>.md. The 1M context window
#       lets V4 see the whole knowledge base in one call. Sweep-prompt-2-
#       synthesize.md.
#
#   Pass 3 — Claude review (small input, critique)
#       Reads V4's raw synthesis log, writes interleaved review (V4 content +
#       Claude verdict blockquote per item) prepended to wiki/synthesis.md.
#       Verdict vocabulary: Confirmed / Confirmed-prioritize / Partial /
#       Push-back / Rejected / Augment / Defer. Sweep-prompt-3-review.md.
#
# Each job has [skip-wiki-sweep] in its commit message + the workflow's job-
# level `if:` checks for that marker, so internal commits don't recursively
# retrigger the whole pipeline.
#
# Secrets required:
#   ANTHROPIC_API_KEY  — Claude API for Pass 1 and Pass 3
#   OPENROUTER_API_KEY — OpenRouter for Pass 2 (V4-Pro)

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**.md'
      - '!wiki/synthesis.md'
  workflow_dispatch:
    inputs:
      trigger_paths:
        description: 'Wiki file path(s) to sweep (space-separated). Blank = diff against last sweep commit.'
        required: false
        type: string

# Never run two sweeps at once — they'd fight over git state.
concurrency:
  group: wiki-sweep
  cancel-in-progress: false

jobs:
  # ============================================================================
  # PASS 1 — Claude propagation
  # ============================================================================
  propagate:
    name: "Pass 1 — Claude propagation"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip-wiki-sweep]')"
    outputs:
      trigger_files: ${{ steps.trigger.outputs.changed }}
      diff_base:     ${{ steps.trigger.outputs.diff_base }}
      sha:           ${{ steps.trigger.outputs.sha }}
      had_changes:   ${{ steps.trigger.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute trigger files
        id: trigger
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.trigger_paths }}" ]]; then
            echo "Manual dispatch with explicit trigger paths"
            CHANGED=$(echo "${{ inputs.trigger_paths }}" | tr ' ' '\n' | grep -v '^$' || true)
            DIFF_BASE="manual"
          else
            LAST_SWEEP=$(git log --format='%H' --grep='^sweep' -n 1 || true)
            if [[ -n "$LAST_SWEEP" ]]; then
              DIFF_BASE="$LAST_SWEEP"
              echo "Last sweep commit: $LAST_SWEEP"
            else
              DIFF_BASE="HEAD~1"
              echo "No prior sweep commit found; diffing HEAD~1..HEAD"
            fi
            CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD 2>/dev/null \
              | grep -E '^wiki/.*\.md$' \
              | grep -v '^wiki/synthesis\.md$' || true)
          fi

          if [[ -z "${CHANGED// /}" ]]; then
            echo "No wiki changes to sweep"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true"            >> "$GITHUB_OUTPUT"
          echo "diff_base=$DIFF_BASE"        >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.sha }}"       >> "$GITHUB_OUTPUT"
          {
            echo "changed<<TRIGGER_EOF"
            echo "$CHANGED"
            echo "TRIGGER_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Trigger files:"
          echo "$CHANGED" | sed 's/^/  /'

      - name: Run Claude propagation
        if: steps.trigger.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   claude-sonnet-4-6
          TRIGGER_FILES:     ${{ steps.trigger.outputs.changed }}
          DIFF_BASE:         ${{ steps.trigger.outputs.diff_base }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TRIGGER_LIST=$(echo "$TRIGGER_FILES" | awk 'NF {printf "  - %s\n", $0}')

          PROMPT_FILE="$(mktemp)"
          {
            cat scripts/sweep-prompt-1-propagate.md
            echo ""
            echo "---"
            echo ""
            echo "TRIGGER: Files changed since last sweep (${DIFF_BASE}) at ${TIMESTAMP}:"
            echo "${TRIGGER_LIST}"
            echo "commit=yes"
            echo "ci=github-actions-sweep-1-propagate"
          } > "$PROMPT_FILE"

          claude --dangerously-skip-permissions -p "$(cat "$PROMPT_FILE")"

      - name: Push propagation
        if: steps.trigger.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
          else
            echo "Pass 1 produced no commit"
          fi

  # ============================================================================
  # PASS 2 — V4 synthesis (full corpus)
  # ============================================================================
  synthesize:
    name: "Pass 2 — V4 synthesis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: propagate
    permissions:
      contents: write
    if: needs.propagate.outputs.had_changes == 'true'
    outputs:
      synthesis_log: ${{ steps.run.outputs.synthesis_log }}
      had_synthesis: ${{ steps.run.outputs.had_synthesis }}

    steps:
      - name: Checkout (post-Pass-1 state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run V4 synthesis
        id: run
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Compose the trigger files string for the synthesis script
          TRIGGER_LIST=$(echo "${{ needs.propagate.outputs.trigger_files }}" | tr '\n' ',' | sed 's/,$//')

          SYNTHESIS_LOG=$(python3 scripts/v4-synthesize.py \
            --commit-sha "${{ github.sha }}" \
            --trigger-files "$TRIGGER_LIST" \
            --diff-base "${{ needs.propagate.outputs.diff_base }}")

          if [[ -z "$SYNTHESIS_LOG" || ! -f "$SYNTHESIS_LOG" ]]; then
            echo "V4 synthesis produced no output file"
            echo "had_synthesis=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "synthesis_log=$SYNTHESIS_LOG" >> "$GITHUB_OUTPUT"
          echo "had_synthesis=true"           >> "$GITHUB_OUTPUT"

          git add "$SYNTHESIS_LOG"
          git commit -m "sweep-2-synthesize: V4 raw synthesis → $SYNTHESIS_LOG [skip-wiki-sweep]"
          git push

  # ============================================================================
  # PASS 3 — Claude review (interleaved into wiki/synthesis.md)
  # ============================================================================
  review:
    name: "Pass 3 — Claude review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [propagate, synthesize]
    permissions:
      contents: write
    if: needs.synthesize.outputs.had_synthesis == 'true'

    steps:
      - name: Checkout (post-Pass-2 state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   claude-sonnet-4-6
          SYNTHESIS_LOG:     ${{ needs.synthesize.outputs.synthesis_log }}
          TRIGGER_FILES:     ${{ needs.propagate.outputs.trigger_files }}
          DIFF_BASE:         ${{ needs.propagate.outputs.diff_base }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TRIGGER_LIST=$(echo "$TRIGGER_FILES" | awk 'NF {printf "  - %s\n", $0}')

          PROMPT_FILE="$(mktemp)"
          {
            cat scripts/sweep-prompt-3-review.md
            echo ""
            echo "---"
            echo ""
            echo "TRIGGER: Pass 3 review of synthesis log at ${TIMESTAMP}:"
            echo "  synthesis_log: ${SYNTHESIS_LOG}"
            echo "  diff_base:     ${DIFF_BASE}"
            echo "  commit_sha:    ${{ github.sha }}"
            echo "  trigger files:"
            echo "${TRIGGER_LIST}"
            echo "commit=yes"
            echo "ci=github-actions-sweep-3-review"
          } > "$PROMPT_FILE"

          claude --dangerously-skip-permissions -p "$(cat "$PROMPT_FILE")"

      - name: Push review
        run: |
          set -euo pipefail
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
          else
            echo "Pass 3 produced no commit"
          fi
