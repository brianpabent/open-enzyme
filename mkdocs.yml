site_name: Open Enzyme
site_description: Open source library of food-grade engineered microbial strains producing therapeutic enzymes
site_url: https://brianpabent.github.io/open-enzyme
repo_url: https://github.com/brianpabent/open-enzyme
repo_name: brianpabent/open-enzyme

docs_dir: wiki
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.smartsymbols
  - attr_list
  - md_in_html

